name: Weekly Wiki Ingestion

on:
  schedule:
    # Runs every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ingestion pipeline
        run: npm run ingest
        env:
          PROPUBLICA_API_KEY: ${{ secrets.PROPUBLICA_API_KEY }}
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated wiki files
        run: |
          git config user.name "myreps-bot"
          git config user.email "bot@myreps.info"
          git add wiki/
          git diff --staged --quiet || git commit -m "chore: weekly wiki update $(date -u +%Y-%m-%d)"
          git push
